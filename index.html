<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📦 SHW File Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .file {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }
        .versions {
            margin-top: 10px;
            padding-left: 10px;
            border-left: 2px solid #ddd;
            display: none;
        }
        button {
            margin-right: 5px;
        }
    </style>
</head>
<body>

<h2>📦 SHW File Downloader</h2>

<select id="branchSelect"></select>

<div id="fileList">Loading files...</div>

<script>
const OWNER = "your-username";   // 🔁 CHANGE THIS
const REPO = "your-repo";       // 🔁 CHANGE THIS

const branchSelect = document.getElementById("branchSelect");
const fileList = document.getElementById("fileList");

// Load branches
async function loadBranches() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/branches`);
    const branches = await res.json();

    branchSelect.innerHTML = branches.map(b => 
        `<option value="${b.name}">${b.name}</option>`
    ).join("");

    loadFiles();
}

// Load files
async function loadFiles() {
    fileList.innerHTML = "Loading files...";

    const branch = branchSelect.value;

    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${branch}`);
    const files = await res.json();

    fileList.innerHTML = "";

    files.forEach(file => {
        if (file.type !== "file") return;

        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            <h3>${file.name}</h3>
            <button onclick="downloadFile('${file.download_url}', '${file.name}')">
                Download Latest
            </button>
            <button onclick="toggleVersions('${file.name}', this)">
                Show Older Versions
            </button>
            <div class="versions" id="versions-${file.name}"></div>
        `;

        fileList.appendChild(div);
    });
}

// Download function
async function downloadFile(url, filename) {
    try {
        const response = await fetch(url);

        if (!response.ok) throw new Error("Download failed");

        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = filename || "download";

        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(blobUrl);
    } catch (err) {
        console.error(err);
        alert("Failed to download file.");
    }
}

// Toggle older versions
async function toggleVersions(filename, btn) {
    const container = document.getElementById(`versions-${filename}`);

    if (container.style.display === "block") {
        container.style.display = "none";
        btn.textContent = "Show Older Versions";
        return;
    }

    btn.textContent = "Loading...";
    container.style.display = "block";

    const branch = branchSelect.value;

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${filename}&sha=${branch}`
    );

    const commits = await res.json();

    container.innerHTML = commits.slice(0, 10).map(commit => {
        const sha = commit.sha;
        const msg = commit.commit.message;
        const date = new Date(commit.commit.author.date).toLocaleString();
        const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${sha}/${filename}`;

        return `
            <div>
                ${date} - ${msg}
                <button onclick="downloadFile('${url}', '${filename}')">
                    Download
                </button>
            </div>
        `;
    }).join("");

    btn.textContent = "Hide Older Versions";
}

// Events
branchSelect.addEventListener("change", loadFiles);

// Init
loadBranches();
</script>

</body>
</html>
