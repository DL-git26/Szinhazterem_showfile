<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKG Színházterem Showfile Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
    margin: 0;
    padding: 40px 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    text-align: center;
}

h1 {
    margin-bottom: 30px;
    font-weight: 600;
}

select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
    margin-bottom: 25px;
    width: 100%;
    font-size: 15px;
}

.file {
    background: #1e293b;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    text-align: left;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.file h3 {
    margin: 0 0 12px 0;
    font-weight: 500;
}

button {
    padding: 8px 14px;
    margin-right: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #2563eb;
}

.versions {
    margin-top: 12px;
    display: none;
    padding-left: 10px;
    border-left: 2px solid #334155;
}

.version-link {
    display: block;
    margin: 6px 0;
    color: #93c5fd;
    text-decoration: none;
    cursor: pointer;
}

.version-link:hover {
    color: #60a5fa;
}
</style>
</head>

<body>

<div class="container">
    <h1>SHW File Downloader</h1>

    <select id="branchSelect"></select>

    <div id="fileList">Loading files...</div>
</div>

<script>
const OWNER = "DL-git26";
const REPO = "AKG_Studio_Szinhazterem_Showfile";

const branchSelect = document.getElementById("branchSelect");
const fileList = document.getElementById("fileList");

// Load branches
async function loadBranches() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/branches`);
    const branches = await res.json();

    branchSelect.innerHTML = branches.map(b =>
        `<option value="${b.name}" ${b.name === "main" ? "selected" : ""}>${b.name}</option>`
    ).join("");

    loadFiles();
}

// Load files (ONLY .shw)
async function loadFiles() {
    const branch = branchSelect.value;
    fileList.innerHTML = "Loading files...";

    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${branch}`);
    const files = await res.json();

    const shwFiles = files.filter(f => f.name.endsWith(".shw"));

    if (shwFiles.length === 0) {
        fileList.innerHTML = "No .shw files found.";
        return;
    }

    fileList.innerHTML = "";

    shwFiles.forEach(file => {
        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            <h3>${file.name}</h3>
            <button onclick="downloadFile('${file.download_url}')">
                Download Latest
            </button>
            <button onclick="toggleVersions('${file.name}', this)">
                Show Older Versions
            </button>
            <div class="versions" id="versions-${file.name}"></div>
        `;

        fileList.appendChild(div);
    });
}

// FORCE download (no tab opening)
async function downloadFile(url) {
    const response = await fetch(url);
    const blob = await response.blob();

    const blobUrl = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;

    const parts = url.split("/");
    a.download = parts[parts.length - 1];

    document.body.appendChild(a);
    a.click();

    a.remove();
    window.URL.revokeObjectURL(blobUrl);
}

// Toggle versions (only .shw, styled links)
async function toggleVersions(filename, btn) {
    if (!filename.endsWith(".shw")) return;

    const container = document.getElementById(`versions-${filename}`);

    if (container.style.display === "block") {
        container.style.display = "none";
        btn.textContent = "Show Older Versions";
        return;
    }

    btn.textContent = "Loading...";
    container.style.display = "block";

    const branch = branchSelect.value;

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${filename}&sha=${branch}`
    );

    const commits = await res.json();

    container.innerHTML = commits.slice(0, 10).map(commit => {
        const sha = commit.sha;
        const msg = commit.commit.message;
        const date = new Date(commit.commit.author.date).toLocaleString();

        const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${sha}/${filename}`;

        return `
            <a class="version-link" href="#" onclick="downloadFile('${url}'); return false;">
                ${date} - ${msg}
            </a>
        `;
    }).join("");

    btn.textContent = "Hide Older Versions";
}

// Events
branchSelect.addEventListener("change", loadFiles);

// Init
loadBranches();
</script>

</body>
</html>
